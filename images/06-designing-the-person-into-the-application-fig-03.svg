<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sequence diagram of a complete login attempt </title>
  <desc id="desc">sequence diagram of a complete login attempt — swim lanes: LoginPanel (submit handler), LoginManager (login method), UserAccount (checkPassword), Hash</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="42" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="13" font-weight="700" fill="#000000">Sequence diagram of a complete login attempt </text>
  <text x="32" y="62" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#555555">sequence diagram of a complete login attempt — swim lanes: LoginPanel (submit handler), LoginManager (login method), UserAccount (checkPassword), Hash</text>
  <rect x="64" y="166" width="112" height="88" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="120" y="205" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#555555">START</text>
  <text x="120" y="226" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#000000">checkpoint</text>
  <path d="M 180 210 C 196 210, 206 210, 218 210" stroke="#000000" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="218" y="166" width="112" height="88" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1"/>
  <text x="274" y="205" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#555555">SEQUENCE</text>
  <text x="274" y="226" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#000000">checkpoint</text>
  <path d="M 334 210 C 350 210, 360 210, 372 210" stroke="#000000" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="372" y="166" width="112" height="88" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="428" y="205" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#555555">DIAGRAM</text>
  <text x="428" y="226" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#000000">checkpoint</text>
  <path d="M 488 210 C 504 210, 514 210, 526 210" stroke="#000000" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="526" y="166" width="112" height="88" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="582" y="205" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#555555">OF</text>
  <text x="582" y="226" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="10" fill="#000000">checkpoint</text>
  <path d="M 120 292 C 240 340, 430 340, 584 292" stroke="#C8102E" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <text x="350" y="362" text-anchor="middle" font-family="'Real Head Pro', 'FF Real', Lato, sans-serif" font-size="11" fill="#000000">The diagram emphasizes sequence, dependency, and the decision point.</text>
</svg>
